<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Heario OG image</title>
<desc>Heario — AI Copilot for Meetings. Dark futuristic social preview card.</desc>
<defs>
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0b0e13"/>
  </radialGradient>
  <radialGradient id="aura1" cx="20%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#0b0e13" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aura2" cx="80%" cy="70%" r="45%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0b0e13" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aura3" cx="85%" cy="20%" r="35%">
    <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#0b0e13" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="panelBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#4f8ef7" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4f8ef7"/>
    <stop offset="50%" stop-color="#7fd1ff"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="40%" stop-color="#cfe0ff"/>
    <stop offset="80%" stop-color="#7fd1ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="micGlow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Clip to full card -->
  <clipPath id="card"><rect width="1200" height="630" rx="0"/></clipPath>
  <!-- Clip geometrics to inner box only -->
  <clipPath id="innerBox"><rect x="340" y="130" width="520" height="370" rx="20"/></clipPath>
</defs>

<g clip-path="url(#card)">

  <!-- Full-bleed background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#aura1)"/>
  <rect width="1200" height="630" fill="url(#aura2)"/>
  <rect width="1200" height="630" fill="url(#aura3)"/>

  <!-- Geometrics clipped to inner box -->
  <g clip-path="url(#innerBox)">
    <!-- Grid lines -->
    <g stroke="#4f8ef7" stroke-opacity="0.12" stroke-width="1">
      <line x1="340" y1="193" x2="860" y2="193"/>
      <line x1="340" y1="256" x2="860" y2="256"/>
      <line x1="340" y1="319" x2="860" y2="319"/>
      <line x1="340" y1="382" x2="860" y2="382"/>
      <line x1="340" y1="445" x2="860" y2="445"/>
      <line x1="400" y1="130" x2="400" y2="500"/>
      <line x1="460" y1="130" x2="460" y2="500"/>
      <line x1="520" y1="130" x2="520" y2="500"/>
      <line x1="580" y1="130" x2="580" y2="500"/>
      <line x1="640" y1="130" x2="640" y2="500"/>
      <line x1="700" y1="130" x2="700" y2="500"/>
      <line x1="760" y1="130" x2="760" y2="500"/>
      <line x1="820" y1="130" x2="820" y2="500"/>
    </g>
    <!-- Constellation dots -->
    <g fill="#7fd1ff">
      <circle cx="395" cy="158" r="1.5" opacity="0.6"/>
      <circle cx="460" cy="185" r="1" opacity="0.4"/>
      <circle cx="420" cy="270" r="2" opacity="0.5"/>
      <circle cx="510" cy="155" r="1.5" opacity="0.5"/>
      <circle cx="570" cy="145" r="1" opacity="0.4"/>
      <circle cx="490" cy="440" r="1.5" opacity="0.4"/>
      <circle cx="380" cy="420" r="2" opacity="0.35"/>
      <circle cx="720" cy="160" r="2" opacity="0.5"/>
      <circle cx="800" cy="185" r="1.5" opacity="0.4"/>
      <circle cx="660" cy="150" r="1" opacity="0.6"/>
      <circle cx="780" cy="380" r="2" opacity="0.4"/>
      <circle cx="840" cy="440" r="1.5" opacity="0.5"/>
      <circle cx="500" cy="470" r="1" opacity="0.4"/>
      <circle cx="740" cy="460" r="2" opacity="0.35"/>
    </g>
    <g fill="#4f8ef7">
      <circle cx="430" cy="210" r="1.5" opacity="0.5"/>
      <circle cx="370" cy="350" r="1" opacity="0.6"/>
      <circle cx="480" cy="420" r="2" opacity="0.4"/>
      <circle cx="760" cy="280" r="1.5" opacity="0.5"/>
      <circle cx="690" cy="390" r="1" opacity="0.4"/>
      <circle cx="830" cy="460" r="2" opacity="0.35"/>
    </g>
    <!-- Constellation lines -->
    <g stroke="#7fd1ff" stroke-opacity="0.18" stroke-width="0.8" fill="none">
      <line x1="395" y1="158" x2="460" y2="185"/>
      <line x1="460" y1="185" x2="430" y2="210"/>
      <line x1="510" y1="155" x2="570" y2="145"/>
      <line x1="720" y1="160" x2="660" y2="150"/>
      <line x1="720" y1="160" x2="800" y2="185"/>
      <line x1="780" y1="380" x2="840" y2="440"/>
    </g>
  </g>

  <!-- Inner panel -->
  <rect x="340" y="130" width="520" height="370" rx="20" fill="#0d1220" fill-opacity="0.88" stroke="url(#panelBorder)" stroke-width="1.5"/>
  <rect x="340" y="130" width="520" height="60" rx="20" fill="#4f8ef7" fill-opacity="0.06"/>
  <rect x="340" y="170" width="520" height="20" fill="#4f8ef7" fill-opacity="0.04"/>

  <!-- Microphone icon (animated) -->
  <g filter="url(#micGlow)" transform="translate(600,205)">
    <!-- Capsule outline -->
    <rect x="-18" y="-32" width="36" height="48" rx="18" fill="none" stroke="url(#waveGrad)" stroke-width="3"/>
    <!-- Mic body fill -->
    <circle cx="0" cy="-8" r="7" fill="#4f8ef7" fill-opacity="0.35"/>
    <!-- Animated LED light -->
    <circle cx="0" cy="-8" r="4" fill="#7fd1ff">
      <animate attributeName="r" values="4;6.5;4;5;4" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0.4;1;0.7;1" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-8;-10;-8;-7;-8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Mic stand arc -->
    <path d="M-28 16 Q-28 44 0 44 Q28 44 28 16" fill="none" stroke="url(#waveGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Stand post -->
    <line x1="0" y1="44" x2="0" y2="58" stroke="#7fd1ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="58" x2="20" y2="58" stroke="#7fd1ff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Left sound waves (animated) -->
  <g filter="url(#glow)" fill="none" stroke="#4f8ef7" stroke-linecap="round">
    <path d="M 536 220 Q 524 235 536 250" stroke-width="2.5">
      <animate attributeName="stroke-opacity" values="0.9;0.15;0.9;0.5;0.9" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 536 220 Q 524 235 536 250;M 534 218 Q 520 235 534 252;M 536 220 Q 524 235 536 250" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M 522 210 Q 504 235 522 260" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.6;0.1;0.6;0.35;0.6" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 522 210 Q 504 235 522 260;M 519 207 Q 499 235 519 263;M 522 210 Q 504 235 522 260" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </path>
    <path d="M 508 200 Q 484 235 508 270" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.35;0.05;0.35;0.2;0.35" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 508 200 Q 484 235 508 270;M 504 196 Q 478 235 504 274;M 508 200 Q 484 235 508 270" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Right sound waves (animated) -->
  <g filter="url(#glow)" fill="none" stroke="#7fd1ff" stroke-linecap="round">
    <path d="M 664 220 Q 676 235 664 250" stroke-width="2.5">
      <animate attributeName="stroke-opacity" values="0.9;0.15;0.9;0.5;0.9" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 664 220 Q 676 235 664 250;M 666 218 Q 680 235 666 252;M 664 220 Q 676 235 664 250" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M 678 210 Q 696 235 678 260" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.6;0.1;0.6;0.35;0.6" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 678 210 Q 696 235 678 260;M 681 207 Q 701 235 681 263;M 678 210 Q 696 235 678 260" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </path>
    <path d="M 692 200 Q 716 235 692 270" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.35;0.05;0.35;0.2;0.35" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M 692 200 Q 716 235 692 270;M 696 196 Q 722 235 696 274;M 692 200 Q 716 235 692 270" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Title -->
  <text x="600" y="328" text-anchor="middle" font-family="'Space Grotesk', 'Sora', system-ui, sans-serif" font-size="82" font-weight="800" letter-spacing="-3" fill="url(#titleGrad)">Heario</text>
  <line x1="440" y1="348" x2="760" y2="348" stroke="url(#waveGrad)" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="385" text-anchor="middle" font-family="'Sora', system-ui, sans-serif" font-size="22" font-weight="400" fill="#7fd1ff" letter-spacing="0.5" fill-opacity="0.9">AI Copilot for Meetings &amp; Interviews</text>

  <!-- Stat pills -->
  <rect x="380" y="414" width="130" height="34" rx="17" fill="#4f8ef7" fill-opacity="0.12" stroke="#4f8ef7" stroke-opacity="0.35" stroke-width="1"/>
  <text x="445" y="436" text-anchor="middle" font-family="'Sora', system-ui, sans-serif" font-size="13" font-weight="600" fill="#7fd1ff">&#9889; &lt;300ms</text>
  <rect x="535" y="414" width="130" height="34" rx="17" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
  <text x="600" y="436" text-anchor="middle" font-family="'Sora', system-ui, sans-serif" font-size="13" font-weight="600" fill="#c084fc">&#128737; Undetectable</text>
  <rect x="690" y="414" width="130" height="34" rx="17" fill="#5fb85f" fill-opacity="0.12" stroke="#5fb85f" stroke-opacity="0.35" stroke-width="1"/>
  <text x="755" y="436" text-anchor="middle" font-family="'Sora', system-ui, sans-serif" font-size="13" font-weight="600" fill="#86efac">&#127992; Windows</text>

  <!-- Corner brackets -->
  <g stroke="#4f8ef7" stroke-opacity="0.4" stroke-width="1.5" fill="none">
    <path d="M 355 145 L 355 155 L 365 155"/>
    <path d="M 845 145 L 845 155 L 835 155"/>
    <path d="M 355 485 L 355 475 L 365 475"/>
    <path d="M 845 485 L 845 475 L 835 475"/>
  </g>

</g>
</svg>
